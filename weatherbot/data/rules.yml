version: "3.1"

rules:

- rule: "Say goodbye anytime the user says goodbye"
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: "Sage 'Auf Wiedersehen' immer, wenn der Benutzer sich verabschiedet und 'Tschüss' sagt"
  steps:
  - intent: goodbye_de
  - action: utter_goodbye_de  

- rule: "Greeting rule"
  steps:
  - intent: greet
  - action: utter_greet

- rule: "Begrüßungsregel"
  steps:
  - intent: greet_de
  - action: utter_greet_de    

- rule: "fallback"
  steps:
  - intent: nlu_fallback
  - action: utter_default